name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - run: npm ci

      - name: Node syntax check
        run: |
          node --check scripts/send-digest.mjs
          node --check scripts/notify-failure.mjs
          node --check email/template.mjs

      - name: YAML lint workflows
        run: |
          python3 -c "
          import sys, yaml, pathlib
          ok = True
          for p in pathlib.Path('.github/workflows').glob('*.yml'):
              try:
                  yaml.safe_load(p.read_text())
                  print(f'  ok  {p}')
              except yaml.YAMLError as e:
                  print(f'FAIL  {p}: {e}', file=sys.stderr)
                  ok = False
          sys.exit(0 if ok else 1)
          "

      # End-to-end smoke against the bundled fixture. Exercises the full
      # render path (template, source links, intro/reflection sections)
      # without hitting Anthropic or Resend, so it's safe in PR context
      # without secrets. Catches the common breakage modes: bad template
      # syntax, schema drift in sample-digest.json, missing imports.
      - name: Render sample digest (preview)
        run: node scripts/send-digest.mjs --sample --preview

      - name: Render sample digest (dry-run)
        run: node scripts/send-digest.mjs --sample --dry-run

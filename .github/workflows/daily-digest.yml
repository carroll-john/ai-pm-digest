name: Daily AI × PM Digest

on:
  schedule:
    # 22:00 UTC = 08:00 Melbourne (AEST, May–Oct) / 09:00 Melbourne (AEDT, Oct–Apr).
    - cron: "0 22 * * *"
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Needed so the post-send step can commit cache/history.json back to main.
    permissions:
      contents: write
    # Explicit `bash` enables `-eo pipefail`. The unspecified default on Linux
    # is `bash -e {0}` (no pipefail), which would let `tee` mask `node`'s exit
    # code in the digest step and skip the failure-notification path entirely.
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - run: npm ci
      - name: Generate and send digest
        id: digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        # tee + pipefail keeps the original exit code while capturing output
        # for the failure-notification step below.
        run: node scripts/send-digest.mjs 2>&1 | tee digest.log
      - name: Persist digest state
        id: persist
        # Runs on both success and failure: on success commits history.json
        # (and clears holdover); on a NO-NEWS abort commits the holdover file
        # so tomorrow's run can re-merge today's survivor(s). `git push` to
        # main races with PR merges and parallel runs of this workflow; on
        # rejection, fetch + rebase + retry — the rebase is clean because no
        # other commit touches these files under normal use.
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # -A stages additions, modifications, AND deletions — needed because
          # clearHoldover() and clearFailureRecord() remove their files on a
          # successful send. Staging the whole cache dir ensures yesterday's
          # failure context gets cleared on today's green run; otherwise stale
          # cache/last-failure.* would linger on main and lie about the state
          # of the most recent run.
          #
          # Stage the dir rather than naming each file: an explicit pathspec for
          # a file that doesn't exist (no holdover / no failure on a normal run)
          # makes `git add` abort with "pathspec did not match" and fails this
          # step on an otherwise-perfect run. `-A -- cache/` is a no-op for
          # absent files; .gitignore keeps untracked junk out.
          git add -A -- cache/
          git diff --cached --quiet && echo "No cache state change to commit." && exit 0
          git commit -m "chore: update digest cache $(date -u +%Y-%m-%d)"
          for attempt in 1 2 3; do
            if git push; then exit 0; fi
            echo "Push attempt $attempt rejected; fetching and rebasing main..."
            git pull --rebase origin main || { echo "Rebase failed — main has a conflicting change to cache/."; exit 1; }
          done
          echo "Push failed after 3 attempts."
          exit 1
      - name: Capture persist failure
        # Only override last-failure.json when persist failed AFTER a
        # successful digest. If the digest itself failed, its own
        # recordFailure() output should win the failure email.
        if: failure() && steps.digest.conclusion == 'success' && steps.persist.conclusion == 'failure'
        # Write a structured failure record so the notification email's subject
        # gets a `[PERSIST]` prefix and a banner explaining that the digest
        # itself shipped — without this, the email would just show the
        # successful digest log tail and look confusing.
        run: |
          mkdir -p cache
          cat > cache/last-failure.json <<'JSON'
          {
            "kind": "PERSIST_PUSH_REJECTED",
            "subject_tag": "PERSIST",
            "stage": "Persist digest history",
            "summary": "The digest was sent successfully, but pushing the updated history.json back to main failed.",
            "hint": "Recipients already got their email — no user-visible impact today. Tomorrow's run may re-surface one or two of today's stories because today's URLs weren't recorded in history. If this keeps happening, check whether branch protection on main blocks github-actions[bot] pushes."
          }
          JSON
      - name: Notify on failure
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RUN_NAME: ${{ github.workflow }}
          COMMIT_SHA: ${{ github.sha }}
        run: node scripts/notify-failure.mjs digest.log
      - name: Persist failure context to main
        # Commits cache/last-failure.json (categorised failure record from
        # send-digest.mjs) and cache/last-failure.log (the 60-line tail
        # written by notify-failure.mjs) so the next debugging conversation
        # can read them straight out of git instead of asking for the email
        # body to be pasted. Runs LAST so it picks up any override from the
        # `Capture persist failure` step above.
        if: failure()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Commit locally BEFORE pulling. The previous design ran
          # `git pull --rebase` first, but cache/last-failure.{json,log} sit
          # as unstaged modifications at this point (recordFailure +
          # notify-failure wrote them), so rebase would error with "cannot
          # pull with rebase: You have unstaged changes" if remote also
          # touched those paths. Committing first means rebase only ever
          # replays committed work — same pattern as the success-path
          # persist step.
          git add -A -- cache/last-failure.json cache/last-failure.log
          git diff --cached --quiet && echo "No failure context to commit." && exit 0
          git commit -m "chore: record failure context $(date -u +%Y-%m-%d)"
          for attempt in 1 2 3; do
            if git push; then exit 0; fi
            echo "Push attempt $attempt rejected; fetching and rebasing main..."
            git pull --rebase origin main || { echo "Rebase failed."; exit 1; }
          done
          echo "Push failed after 3 attempts."
          exit 1

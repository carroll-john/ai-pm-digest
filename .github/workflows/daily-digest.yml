name: Daily AI × PM Digest

on:
  schedule:
    # 22:00 UTC = 08:00 Melbourne (AEST, May–Oct) / 09:00 Melbourne (AEDT, Oct–Apr).
    - cron: "0 22 * * *"
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Needed so the post-send step can commit cache/history.json back to main.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - run: npm ci
      - name: Generate and send digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: node scripts/send-digest.mjs
      - name: Persist digest history
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cache/history.json
          git diff --cached --quiet && echo "No history change to commit." && exit 0
          git commit -m "chore: update digest history $(date -u +%Y-%m-%d)"
          git push
